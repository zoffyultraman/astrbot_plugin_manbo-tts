name: Auto Release Zip

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 仓库（fetch all tags）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_RELEASE }}
          fetch-depth: 0  # 获取完整历史和所有 tags

      # 2️⃣ 生成递增版本号
      - name: 生成递增版本号
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          echo "Latest tag: $LAST_TAG"
          LAST_NUM=${LAST_TAG#v}
          NEW_NUM=$((LAST_NUM + 1))
          NEW_TAG="v$NEW_NUM"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

      # 3️⃣ Push tag 到远程
      - name: Push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          NEW_TAG=${{ steps.version.outputs.NEW_TAG }}
          if git ls-remote --tags origin | grep -q "refs/tags/$NEW_TAG"; then
            echo "Tag $NEW_TAG already exists, skipping push"
          else
            git tag $NEW_TAG
            git push origin $NEW_TAG
          fi

      # 4️⃣ 创建 Release
      - name: 创建 Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.NEW_TAG }}
          name: ${{ steps.version.outputs.NEW_TAG }}
          token: ${{ secrets.AUTO_RELEASE }}
          draft: false
          prerelease: false

      # 5️⃣ 打包仓库为 zip
      - name: 打包仓库
        run: |
          zip -r astrbot_plugin_manbo-tts-${{ steps.version.outputs.NEW_TAG }}.zip . -x "*.git*" "*.github*"

      # 6️⃣ 上传 zip 到 Release
      - name: 上传 zip 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: astrbot_plugin_manbo-tts-${{ steps.version.outputs.NEW_TAG }}.zip
          token: ${{ secrets.AUTO_RELEASE }}