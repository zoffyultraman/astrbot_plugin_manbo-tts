name: Auto Release Zip

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ 生成递增版本号
      - name: 生成递增版本号
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0")
          LAST_NUM=${LAST_TAG#v}
          NEW_NUM=$((LAST_NUM + 1))
          NEW_TAG="v$NEW_NUM"
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

      # 3️⃣ Push tag 到远程（确保 Release 有效）
      - name: Push tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.NEW_TAG }}
          git remote set-url origin https://x-access-token:${{ secrets.AUTO_RELEASE }}@github.com/zoffyultraman/astrbot_plugin_manbo-tts.git
          git push origin ${{ steps.version.outputs.NEW_TAG }}

      # 4️⃣ 创建 Release
      - name: 创建 Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.NEW_TAG }}
          name: ${{ steps.version.outputs.NEW_TAG }}
          token: ${{ secrets.AUTO_RELEASE }}
          draft: false
          prerelease: false

      # 5️⃣ 打包 zip
      - name: 打包仓库
        run: |
          zip -r astrbot_plugin_manbo-tts-${{ steps.version.outputs.NEW_TAG }}.zip . -x "*.git*" "*.github*"

      # 6️⃣ 上传 zip 到 Release
      - name: 上传 zip 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: astrbot_plugin_manbo-tts-${{ steps.version.outputs.NEW_TAG }}.zip
          token: ${{ secrets.AUTO_RELEASE }}